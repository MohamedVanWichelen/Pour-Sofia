<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Mes Projets</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;

        background: linear-gradient(135deg,
                #ffffff,
                #ffeef3,
                #f5ebe3);

        min-height: 100vh;
    }

    .title {
        text-align: center;
        margin-top: 50px;
        font-size: 2.5rem;
        color: #333;
    }

    .projects {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        padding: 50px;
    }

    .card {
        width: 250px;
        padding: 20px;
        border-radius: 20px;

        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);

        text-decoration: none;
        color: #333;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);

        transition: all 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
        margin: 0 0 10px;
    }

    .card p {
        font-size: 0.9rem;
        color: #666;
    }

    .cardT {
        width: 250px;
        padding: 20px;
        border-radius: 20px;

        background: rgba(90, 90, 90, 0.7);
        backdrop-filter: blur(10px);

        text-decoration: none;
        color: #333;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);

        transition: all 0.3s ease;
    }
</style>

<body>

    <h1 class="title">Mes Projets</h1>

    <div class="projects">

        <a href="https://new-horizon-ecru.vercel.app" class="card">
            <h2>new-horizon</h2>
            <p>ici pour te sentirte mieux</p>
        </a>

        <a href="https://mohamedvanwichelen.github.io/Toii/" class="card">
            <h2>Toii</h2>
            <p>Un message rien que pour toi</p>
        </a>

        <a href="https://mohamedvanwichelen.github.io/Racourci-pour-toi/" class="card">
            <h2>Racourci-pour-toi</h2>
            <p>Des raccourcis pour t'aider avec ZBrush</p>
        </a>

        <a href="" class="cardT">
            <h2>...🚧</h2>
            <p>en construction  🚧</p>
        </a>

    </div>

</body>

</html>
