<style>
    body {

    .title {

    .projects {

        padding: 50px;
    }

    .card {

        padding: 20px;

        text-decoration: none;
        color: #333;

        transition: all 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
        margin: 0 0 10px;
    }

    .card p {
        font-size: 0.9rem;
        color: #666;
    }

        width: 250px;
