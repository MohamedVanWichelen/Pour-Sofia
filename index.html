<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérité ou malaise</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#F5E6DA,#E8B4B8,#FFF9F5);
}
.app{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}
h1{font-size:30px;margin-bottom:40px;font-weight:600}

/* INTRO OVERLAY */
.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}
.modal{
  background:white;
  padding:30px;
  border-radius:20px;
  max-width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}
.modal h2{margin-bottom:15px}
.modal p{font-size:15px;line-height:1.5;margin-bottom:20px}
.modal button{
  background:#E8B4B8;
  border:none;
  padding:12px 25px;
  border-radius:25px;
  cursor:pointer;
}

.loader{
  width:90px;height:90px;border-radius:50%;
  border:6px solid rgba(255,255,255,0.6);
  border-top:6px solid #E8B4B8;
  animation:spin 1s linear infinite;
  opacity:0;
}
.loader.active{opacity:1}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

button.main{
  margin-top:30px;
  background:#E8B4B8;
  border:none;
  padding:15px 30px;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}

.card{
  margin-top:40px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  max-width:320px;
  opacity:0;
  transform:translateY(20px) scale(0.95);
  transition:all 0.5s ease;
}
.card.show{opacity:1;transform:translateY(0) scale(1)}
.card p{font-size:18px;line-height:1.5}
</style>
</head>
<body>

<!-- INTRO -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>⚠️ Règle unique</h2>
    <p>
      Ici, il n’y a qu’une seule règle :<br><br>
      <strong>Tu réponds… ou tu te tais.</strong><br><br>
      Mais bon… en général, ceux qui se taisent sont juste ceux
      qui ont <em>beaucoup trop de choses à cacher</em> 😌
    </p>
    <button onclick="startApp()">J’assume</button>
  </div>
</div>

<div class="app">
  <h1>✨ Vérité ou malaise</h1>
  <div class="loader" id="loader"></div>
  <button class="main" onclick="spin()">Lancer</button>
  <div class="card" id="card">
    <p id="question"></p>
  </div>
</div>

<script>
function startApp(){
  document.getElementById('overlay').style.display='none';
}

const questions = [
"Quel est ton dernier mensonge ?",
"Une habitude bizarre que tu as ?",
"Ton plus grand regret récent ?",
"Qui t’attire secrètement ?",
"Quel est ton plus gros défaut ?",
"Une chose que tu n’assumes pas ?",
"La dernière personne que tu as stalk ?",
"Ton crush actuel ?",
"Un secret que peu de gens connaissent ?",
"Une peur que tu caches ?",
"Ton pire moment gênant ?",
"Une chose que tu changerais dans ta vie ?",
"As-tu déjà menti à quelqu’un ici ?",
"Ton plus gros complexe ?",
"Une chose que tu regretteras peut-être plus tard ?",
"As-tu déjà triché ?",
"Une chose que tu fais en cachette ?",
"Ton plus grand rêve ?",
"Une personne que tu envies ?",
"Une chose que tu n’as jamais osé dire ?",
"Ton pire souvenir ?",
"Une chose que tu voudrais oublier ?",
"As-tu déjà brisé un cœur ?",
"As-tu déjà été jaloux ?",
"Une chose que tu trouves attirante chez quelqu’un ?",
"Une habitude honteuse ?",
"Ton dernier moment de honte ?",
"Une chose que tu fais quand personne ne regarde ?",
"Une erreur que tu referais ?",
"Ton plus grand accomplissement ?",
"Une chose que tu n’aimes pas chez toi ?",
"As-tu déjà eu un crush sur un ami ?",
"Une chose que tu regrettes d’avoir dit ?",
"Une peur irrationnelle ?",
"Une chose que tu voudrais améliorer ?",
"Ton plus beau souvenir ?",
"Une personne qui t’a marqué ?",
"Une chose que tu caches à ta famille ?",
"Une chose que tu fais trop souvent ?",
"Une qualité que tu admires chez quelqu’un ?",
"Une chose que tu détestes ?",
"Ton plus gros mensonge ?",
"Une chose que tu voudrais avouer ?",
"Une chose que tu n’as jamais faite ?",
"Une situation où tu t’es senti mal ?",
"Une chose que tu ferais si tu n’avais pas peur ?",
"Une chose que tu voudrais changer chez quelqu’un ?",
"Une chose que tu gardes pour toi ?",
"Une pensée que tu n’as jamais dite ?",
"Une chose qui te rend vraiment heureux ?"
];

let loading = false;

function spin(){
  if(loading) return;
  loading = true;

  const loader = document.getElementById('loader');
  const card = document.getElementById('card');
  const questionEl = document.getElementById('question');

  card.classList.remove('show');
  loader.classList.add('active');

  setTimeout(()=>{
    const random = Math.floor(Math.random()*questions.length);
    questionEl.textContent = questions[random];

    loader.classList.remove('active');
    card.classList.add('show');

    loading = false;
  },2000);
}
</script>
</body>
</html>
